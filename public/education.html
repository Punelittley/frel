<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="styles/education.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<style>
    .edu-hero {
        padding: 70px 0 50px;
        text-align: center;
        background: radial-gradient(circle at center, #ffffff 0%, #f7f7f9 100%);
        border-bottom: 1px solid var(--border-soft);
    }

    .edu-hero h1 {
        font-size: 36px;
        font-weight: 800;
        margin-bottom: 10px;
    }

    .edu-hero p {
        color: var(--text-muted);
        font-size: 17px;
        max-width: 500px;
        margin: 0 auto;
    }

    .role-switch {
        display: flex;
        justify-content: center;
        gap: 0;
        margin: 40px auto 0;
        background: #f0f0f0;
        padding: 4px;
        width: fit-content;
    }

    .role-btn {
        padding: 12px 32px;
        border: none;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        background: transparent;
        color: #74767e;
    }

    .role-btn.active {
        background: #fff;
        color: #222;
    }

    .role-description {
        max-width: 700px;
        margin: 30px auto 60px;
        background: #fff;
        border: 1px solid #e4e5e7;
        padding: 32px;
    }

    .role-description h3 {
        font-size: 18px;
        font-weight: 800;
        margin-bottom: 16px;
        color: #222;
    }

    .role-description p {
        font-size: 15px;
        color: #62646a;
        line-height: 1.7;
        margin-bottom: 12px;
    }

    .role-description ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .role-description ul li {
        padding: 10px 0;
        font-size: 14px;
        color: #404145;
        display: flex;
        align-items: flex-start;
        gap: 10px;
        border-bottom: 1px solid #f9f9f9;
    }

    .role-description ul li:last-child {
        border-bottom: none;
    }

    .role-description ul li i {
        color: #1dbf73;
        margin-top: 3px;
        flex-shrink: 0;
    }

    .page-footer {
        text-align: center;
        padding: 30px 0;
        font-size: 13px;
        color: #999;
        border-top: 1px solid var(--border-soft);
        margin-top: 40px;
    }

    @media (max-width: 768px) {
        .edu-hero {
            padding: 50px 0 30px;
        }

        .edu-hero h1 {
            font-size: 26px;
        }

        .role-btn {
            padding: 10px 24px;
            font-size: 13px;
        }

        .role-description {
            padding: 24px;
            margin: 20px 16px 40px;
        }
    }
</style>

<body>
    <div id="header-placeholder"></div>

    <section class="edu-hero">
        <div class="container">
            <h1>Центр обучения</h1>
            <p>Общие правила и рекомендации для работы на платформе</p>
            <div class="role-switch">
                <button class="role-btn active" data-role="buyer">Я заказчик</button>
                <button class="role-btn" data-role="seller">Я исполнитель</button>
            </div>
        </div>
    </section>

    <main class="container">
        <div class="role-description" id="roleDescription"></div>
    </main>

    <div class="page-footer">Спасибо что выбираете нас!</div>

    <script>
        function getAvatarSrc(u) {
            if (u && u.avatar_data) return u.avatar_data;
            return 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + (u ? u.username : 'user');
        }

        function initHeaderAuth() {
            const user = JSON.parse(localStorage.getItem('mw_user') || 'null');
            if (user) {
                const loginBtn = document.getElementById('headerLoginBtn');
                if (loginBtn) loginBtn.style.display = 'none';
                const menu = document.getElementById('userMenu');
                if (menu) {
                    menu.style.display = 'block';
                    document.getElementById('headerAvatar').src = getAvatarSrc(user);
                    document.getElementById('headerUserName').textContent = user.first_name || user.username;
                }
            }
        }

        fetch('header.html').then(r => r.text()).then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
            initHeaderAuth();
        });

        const roleDescriptions = {
            buyer: {
                title: 'Руководство для заказчика',
                intro: 'Как заказчик, вы можете размещать проекты, выбирать исполнителей и контролировать выполнение задач. Вот что важно знать:',
                items: [
                    'Чётко формулируйте техническое задание — это ускорит поиск подходящего исполнителя',
                    'Указывайте реальный бюджет и сроки — это привлечёт профессионалов',
                    'Изучайте портфолио и отзывы исполнителей перед выбором',
                    'Используйте безопасную сделку — деньги переводятся только после принятия работы',
                    'Общайтесь с исполнителем через встроенные сообщения платформы',
                    'При возникновении проблем обращайтесь в поддержку — мы поможем решить спор',
                ]
            },
            seller: {
                title: 'Руководство для исполнителя',
                intro: 'Как исполнитель, вы можете откликаться на проекты, предлагать свои услуги и зарабатывать. Вот что важно знать:',
                items: [
                    'Заполните профиль полностью — укажите навыки, опыт и специализацию',
                    'Добавьте работы в портфолио — заказчики оценивают по реальным примерам',
                    'Пишите персонализированные отклики на проекты, а не шаблонные',
                    'Указывайте реальные сроки выполнения — не обещайте то, что не сможете выполнить',
                    'Поддерживайте связь с заказчиком — отвечайте на сообщения оперативно',
                    'Качественная работа = хорошие отзывы = больше заказов в будущем',
                ]
            }
        };

        let currentRole = 'buyer';

        function renderRoleDescription() {
            const data = roleDescriptions[currentRole];
            document.getElementById('roleDescription').innerHTML = `
                <h3>${data.title}</h3>
                <p>${data.intro}</p>
                <ul>
                    ${data.items.map(item => `<li><i class="fa fa-check-circle"></i> ${item}</li>`).join('')}
                </ul>
            `;
        }

        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRole = btn.dataset.role;
                renderRoleDescription();
            });
        });

        renderRoleDescription();
    </script>
</body>

</html>
