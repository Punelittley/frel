<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="styles/exchange.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<style>
    .exchange-header {
    margin: 50px 0 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.exchange-header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
}

.btn-create {
    background: var(--accent-green);
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 0;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-create:hover {
    background: #19a463;
}

.filters {
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.filter-btn {
    padding: 8px 18px;
    border: 1px solid #e4e5e7;
    border-radius: 0;
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    color: #74767e;
    cursor: pointer;
    transition: 0.2s;
}

.filter-btn:hover,
.filter-btn.active {
    border-color: var(--accent-green);
    color: var(--accent-green);
}

.project-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 60px;
}

.project-card {
    border: 1px solid #e4e5e7;
    border-radius: 0;
    padding: 24px;
    background: #fff;
    transition: 0.2s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
}

.project-card:hover {
    border-color: #ccc;
}

.project-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
}

.project-category {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--accent-green);
    background: rgba(29, 191, 115, 0.08);
    padding: 4px 10px;
    border-radius: 0;
}

.project-price {
    font-size: 22px;
    font-weight: 800;
    color: #222;
}

.project-title {
    font-size: 18px;
    font-weight: 700;
    color: #222;
    margin-bottom: 8px;
    line-height: 1.3;
}

.project-title:hover {
    color: var(--accent-green);
}

.project-desc {
    font-size: 14px;
    color: #74767e;
    line-height: 1.5;
    margin-bottom: 16px;
}

.project-skills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
}

.skill-tag {
    padding: 4px 12px;
    background: #f7f7f9;
    border-radius: 0;
    font-size: 12px;
    font-weight: 600;
    color: #62646a;
}

.project-meta {
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: #999;
    align-items: center;
}

.project-meta i {
    margin-right: 5px;
}

.project-author {
    display: flex;
    align-items: center;
    gap: 8px;
}

.project-author img {
    width: 24px;
    height: 24px;
    border-radius: 50%;
}

.project-author span {
    font-weight: 600;
    color: #555;
}

.page-footer {
    text-align: center;
    padding: 30px 0;
    font-size: 13px;
    color: #999;
    border-top: 1px solid var(--border-soft);
    margin-top: 40px;
}

@media (max-width: 768px) {
    .exchange-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        margin: 30px 0 20px;
    }

    .exchange-header h1 {
        font-size: 22px;
    }

    .btn-create {
        padding: 10px 20px;
        font-size: 13px;
    }

    .filters {
        gap: 8px;
    }

    .filter-btn {
        padding: 6px 14px;
        font-size: 12px;
    }

    .project-card {
        padding: 16px;
    }

    .project-price {
        font-size: 18px;
    }

    .project-title {
        font-size: 16px;
    }

    .project-desc {
        font-size: 13px;
    }

    .project-skills .skill-tag {
        font-size: 11px;
        padding: 3px 8px;
    }
}

@media (max-width: 480px) {
    .exchange-header h1 {
        font-size: 20px;
    }

    .exchange-header {
        margin: 20px 0 16px;
    }

    .project-top {
        flex-direction: column;
        gap: 8px;
    }

    .project-price {
        font-size: 16px;
    }

    .project-title {
        font-size: 15px;
    }

    .project-card {
        padding: 14px;
    }

    .filters {
        overflow-x: auto;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
    }

    .filters::-webkit-scrollbar {
        display: none;
    }

    .filter-btn {
        flex-shrink: 0;
    }
}
</style>
<body>
    <div id="header-placeholder"></div>
    <main class="container">
        <div class="exchange-header">
            <h1>Биржа проектов</h1>
            <a href="create.html" class="btn-create"><i class="fa fa-plus"></i>Создать проект</a>
        </div>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="dev">Разработка</button>
            <button class="filter-btn" data-filter="design">Дизайн</button>
            <button class="filter-btn" data-filter="seo">SEO</button>
            <button class="filter-btn" data-filter="texts">Тексты</button>
            <button class="filter-btn" data-filter="ads">Реклама</button>
        </div>

        <div class="project-list" id="projectList"></div>
    </main>

    <div class="page-footer">Спасибо что выбираете нас!</div>

    <script>
        const USER_IMAGES = {
            'aleksei_dev': '/img/11.png',
            'marina_design': '/img/7.png',
            'ivan_seo': '/img/12.png',
            'olga_texts': '/img/8.png',
            'dmitry_ads': '/img/13.png',
            'elena_dev': '/img/9.png',
            'sergey_design': '/img/13.png',
            'anna_seo': '/img/14.png',
        };

        function getUserAvatar(username) {
            return USER_IMAGES[username] || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username;
        }
        const LOCAL_PROJECTS = [
            { id: 1, title: 'Разработка интернет-магазина на React', description: 'Нужен полноценный интернет-магазин с корзиной, оплатой и админ-панелью. Дизайн готов в Figma. Адаптив обязателен.', price: 85000, category: 'dev', category_label: 'Разработка', skills: ['React', 'Node.js', 'PostgreSQL', 'TypeScript'], offers: 12, created_at: '2025-05-28', author: 'aleksei_dev' },
            { id: 2, title: 'Дизайн мобильного приложения для доставки еды', description: 'Требуется UI/UX дизайн для мобильного приложения доставки. 15-20 экранов, iOS + Android. Референсы предоставлю.', price: 45000, category: 'design', category_label: 'Дизайн', skills: ['Figma', 'UI/UX', 'Mobile', 'Prototyping'], offers: 8, created_at: '2025-05-27', author: 'marina_design' },
            { id: 3, title: 'SEO-продвижение сайта автосервиса', description: 'Нужно вывести сайт автосервиса в ТОП-10 по ключевым запросам в Москве. Текущие позиции 30-50.', price: 30000, category: 'seo', category_label: 'SEO', skills: ['SEO', 'Аналитика', 'Google Ads', 'Яндекс'], offers: 5, created_at: '2025-05-26', author: 'ivan_seo' },
            { id: 4, title: 'Написание статей для блога IT-компании', description: 'Нужны 10 экспертных статей по 3000-5000 символов на тему кибербезопасности и разработки ПО. С SEO-оптимизацией.', price: 25000, category: 'texts', category_label: 'Тексты', skills: ['Копирайтинг', 'SEO-тексты', 'IT', 'Блог'], offers: 14, created_at: '2025-05-25', author: 'olga_texts' },
            { id: 5, title: 'Настройка рекламных кампаний в Яндекс.Директ', description: 'Настройка контекстной рекламы для стоматологической клиники. Бюджет 50 000₽/мес. Нужна аналитика и оптимизация.', price: 20000, category: 'ads', category_label: 'Реклама', skills: ['Яндекс.Директ', 'Аналитика', 'A/B тесты'], offers: 7, created_at: '2025-05-24', author: 'dmitry_ads' },
            { id: 6, title: 'Верстка лендинга для онлайн-школы', description: 'Pixel-perfect верстка по макету из Figma. Адаптив на все устройства. Анимации при скролле. Подключение форм.', price: 15000, category: 'dev', category_label: 'Разработка', skills: ['HTML', 'CSS', 'JavaScript', 'GSAP'], offers: 19, created_at: '2025-05-23', author: 'elena_dev' },
            { id: 7, title: 'Редизайн корпоративного сайта', description: 'Полный редизайн сайта строительной компании. 8 страниц, современный стиль, упор на конверсию. Все исходники в Figma.', price: 60000, category: 'design', category_label: 'Дизайн', skills: ['Figma', 'Web-дизайн', 'Прототипы', 'Брендинг'], offers: 6, created_at: '2025-05-22', author: 'sergey_design' },
            { id: 8, title: 'Аудит и оптимизация сайта для поисковиков', description: 'Полный технический и контентный SEO-аудит. Формирование стратегии продвижения на 6 месяцев. Отчёт и рекомендации.', price: 18000, category: 'seo', category_label: 'SEO', skills: ['SEO-аудит', 'Screaming Frog', 'Ahrefs', 'Техническое SEO'], offers: 3, created_at: '2025-05-21', author: 'anna_seo' },
            { id: 9, title: 'Разработка Telegram-бота для записи клиентов', description: 'Бот для автоматической записи клиентов в салон красоты. Интеграция с Google Календарём. Напоминания и уведомления.', price: 35000, category: 'dev', category_label: 'Разработка', skills: ['Python', 'Telegram API', 'PostgreSQL', 'Google API'], offers: 9, created_at: '2025-05-20', author: 'aleksei_dev' },
            { id: 10, title: 'Создание презентации для инвесторов', description: 'Дизайн питч-дека на 20 слайдов для стартапа в финтехе. Инфографика, графики, современный минималистичный стиль.', price: 12000, category: 'design', category_label: 'Дизайн', skills: ['Презентации', 'PowerPoint', 'Figma', 'Инфографика'], offers: 11, created_at: '2025-05-19', author: 'marina_design' },
            { id: 11, title: 'Контент-план и тексты для соцсетей', description: 'Разработка контент-плана на 1 месяц для Instagram и Telegram. 30 постов + 10 сторис. Тематика — фитнес.', price: 15000, category: 'texts', category_label: 'Тексты', skills: ['SMM', 'Копирайтинг', 'Контент-план', 'Instagram'], offers: 16, created_at: '2025-05-18', author: 'olga_texts' },
            { id: 12, title: 'Настройка таргетированной рекламы VK', description: 'Запуск и ведение рекламных кампаний в VK для интернет-магазина одежды. Создание креативов, тестирование аудиторий.', price: 25000, category: 'ads', category_label: 'Реклама', skills: ['VK Ads', 'Таргетинг', 'Креативы', 'A/B тесты'], offers: 4, created_at: '2025-05-17', author: 'dmitry_ads' },
            { id: 13, title: 'Бэкенд API для мобильного приложения', description: 'Разработка REST API на Node.js для приложения трекера задач. Авторизация JWT, CRUD, WebSocket уведомления.', price: 55000, category: 'dev', category_label: 'Разработка', skills: ['Node.js', 'Express', 'MongoDB', 'WebSocket'], offers: 7, created_at: '2025-05-16', author: 'elena_dev' },
            { id: 14, title: 'Логотип и фирменный стиль для кофейни', description: 'Разработка логотипа, цветовой палитры, типографики и основных носителей бренда для новой кофейни в центре города.', price: 20000, category: 'design', category_label: 'Дизайн', skills: ['Логотип', 'Брендинг', 'Illustrator', 'Фирменный стиль'], offers: 22, created_at: '2025-05-15', author: 'sergey_design' },
            { id: 15, title: 'Продвижение канала YouTube', description: 'SEO-оптимизация видео, подбор ключевых слов, оформление превью и описаний для канала о путешествиях. 20 видео.', price: 22000, category: 'seo', category_label: 'SEO', skills: ['YouTube SEO', 'VidIQ', 'Превью', 'Ключевые слова'], offers: 8, created_at: '2025-05-14', author: 'anna_seo' },
        ];

        let currentFilter = 'all';

        function getAvatarSrc(u) {
            if (u && u.avatar_data) return u.avatar_data;
            return 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + (u ? u.username : 'user');
        }

        function initHeaderAuth() {
            const user = JSON.parse(localStorage.getItem('mw_user') || 'null');
            if (user) {
                document.getElementById('headerLoginBtn').style.display = 'none';
                const menu = document.getElementById('userMenu');
                menu.style.display = 'block';
                document.getElementById('headerAvatar').src = getAvatarSrc(user);
                document.getElementById('headerUserName').textContent = user.first_name || user.username;
            }
            document.addEventListener('click', function(e) {
                const dd = document.getElementById('userDropdown');
                const menu = document.getElementById('userMenu');
                if (dd && menu && !menu.contains(e.target)) dd.classList.remove('show');
            });
        }

        function logoutUser() {
            localStorage.removeItem('mw_user');
            window.location.href = 'index.html';
        }

        fetch('header.html').then(r => r.text()).then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
            const path = window.location.pathname.split("/").pop().replace(".html","");
            const link = document.querySelector('.nav-link[data-page="' + path + '"]');
            if (link) link.classList.add('active-link');
            initHeaderAuth();
        });

        function renderProjects(projects) {
            const filtered = currentFilter === 'all' ? projects : projects.filter(p => p.category === currentFilter);
            document.getElementById('projectList').innerHTML = filtered.length === 0
                ? '<div style="text-align:center;padding:40px;color:#999;">Нет проектов в этой категории</div>'
                : filtered.map(p => {
                    const skills = Array.isArray(p.skills) ? p.skills : (typeof p.skills === 'string' ? JSON.parse(p.skills) : []);
                    const authorAvatar = p.author_avatar_url || getUserAvatar(p.author || 'unknown');
                    const authorName = p.author || 'Аноним';
                    return `<a href="exchange_info.html?id=${p.id}" class="project-card">
                        <div class="project-top">
                            <span class="project-category">${p.category_label || p.category}</span>
                            <span class="project-price">${p.price.toLocaleString()} ₽</span>
                        </div>
                        <div class="project-title">${p.title}</div>
                        <div class="project-desc">${p.description}</div>
                        <div class="project-skills">
                            ${skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
                        </div>
                        <div class="project-meta">
                            <div class="project-author">
                                <img src="${authorAvatar}" alt="">
                                <span>${authorName}</span>
                            </div>
                            <span>${p.offers || 0} откликов</span>
                            <span>${new Date(p.created_at).toLocaleDateString('ru-RU')}</span>
                        </div>
                    </a>`;
                }).join('');
        }

        async function fetchProjects() {
            try {
                const res = await fetch('/api/projects');
                if (!res.ok) throw new Error('API error');
                const projects = await res.json();
                const allProjects = [...projects, ...LOCAL_PROJECTS.filter(lp => !projects.find(p => p.id === lp.id))];
                renderProjects(allProjects);
            } catch(e) {
                renderProjects(LOCAL_PROJECTS);
            }
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                fetchProjects();
            });
        });

        window.onload = fetchProjects;
    </script>
</body>
</html>
