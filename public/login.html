<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="styles/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
</head>
<style>
    .auth-page {
    min-height: calc(100vh - 60px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 30% 50%, #f7f7f9 0%, #ffffff 70%);
}

.auth-card {
    background: #fff;
    border: 1px solid #e4e5e7;
    border-radius: 16px;
    padding: 48px;
    width: 100%;
    max-width: 420px;
}

.auth-logo {
    font-size: 28px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
}

.auth-logo a {
    text-decoration: none;
    color: #222;
}

.auth-subtitle {
    text-align: center;
    color: #74767e;
    font-size: 15px;
    margin-bottom: 32px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #404145;
    margin-bottom: 6px;
}

.form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #e4e5e7;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
}

.form-group input:focus {
    border-color: #1dbf73;
}

.form-group .hint {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
}

.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    font-size: 13px;
}

.form-options label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #62646a;
    cursor: pointer;
}

.form-options a {
    color: #1dbf73;
    text-decoration: none;
    font-weight: 600;
}

.btn-auth {
    width: 100%;
    padding: 14px;
    background: #1dbf73;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
}

.btn-auth:hover {
    background: #19a463;
}

.auth-footer {
    text-align: center;
    font-size: 14px;
    color: #74767e;
    margin-top: 24px;
}

.auth-footer a {
    color: #1dbf73;
    text-decoration: none;
    font-weight: 600;
}

.error-msg {
    color: #e74c3c;
    font-size: 13px;
    margin-top: 6px;
    display: none;
}

.page-footer {
    text-align: center;
    padding: 30px 0;
    font-size: 13px;
    color: #999;
    border-top: 1px solid var(--border-soft);
    margin-top: 40px;
}

@media (max-width: 480px) {
    .auth-page {
        padding: 20px 12px;
    }

    .auth-card {
        padding: 28px 20px;
        border-radius: 12px;
    }

    .auth-logo {
        font-size: 24px;
    }

    .auth-subtitle {
        font-size: 13px;
        margin-bottom: 24px;
    }

    .form-group input {
        padding: 10px 12px;
        font-size: 13px;
    }

    .form-options {
        flex-direction: column;
        gap: 10px;
        align-items: flex-start;
    }

    .btn-auth {
        padding: 12px;
        font-size: 14px;
    }

    .page-footer {
        font-size: 12px;
        padding: 16px;
    }
}
</style>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo"><a href="index.html">Freelance Market</a></div>
            <div class="auth-subtitle">Войдите в свой аккаунт</div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="example@mail.ru" required maxlength="16">
                    <div class="hint">Максимум 16 символов</div>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="Введите пароль" required minlength="8">
                    <div class="hint">Минимум 8 символов</div>
                </div>

                <div class="form-options">
                    <label><input type="checkbox"> Запомнить меня</label>
                    <a href="#">Забыли пароль?</a>
                </div>

                <div class="error-msg" id="loginError">Неверный email или пароль</div>

                <button type="submit" class="btn-auth">Войти</button>
            </form>

            <div class="auth-footer">
                Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </div>
        </div>
    </div>

    <div class="page-footer">Спасибо что выбираете нас!</div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const errEl = document.getElementById('loginError');
            errEl.style.display = 'none';

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            // Валидация email
            if (email.length > 16) {
                errEl.textContent = 'Email максимум 16 символов';
                errEl.style.display = 'block';
                return;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errEl.textContent = 'Введите корректный email';
                errEl.style.display = 'block';
                return;
            }

     
            if (password.length < 8) {
                errEl.textContent = 'Пароль минимум 8 символов';
                errEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('mw_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    errEl.textContent = data.message || 'Неверный email или пароль';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = 'Ошибка сервера. Попробуйте позже.';
                errEl.style.display = 'block';
            }
        }
    </script>
</body>
</html>
